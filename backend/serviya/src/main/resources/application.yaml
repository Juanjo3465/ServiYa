spring:
  application:
    name: serviya
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 20

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

server:
  error:
    include-stacktrace: always
    include-message: always

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}

# Filtro de palabras (RNF-006): se censuran en todo texto libre antes de persistir
# (descripcion de perfil, motivo de reportes, resenas). Ampliar la lista NO requiere recompilar.
serviya:
  word-filter:
    blocked-words: >-
      idiota,imbecil,estupido,estupida,maldito,maldita,mierda,puta,puto,
      cabron,gilipollas,pendejo,pendeja,marica,huevon,malparido,gonorrea,
      hijueputa,verga,coño,joder,zorra,perra
  # Envío de correo (canal EMAIL). enabled=false por defecto: sin bean de EmailPort, la entrega EMAIL
  # degrada a FAILED sin romper nada. El api-key es SECRETO -> solo por variable de entorno EMAIL_API_KEY.
  email:
    enabled: ${EMAIL_ENABLED:false}
    provider-url: ${EMAIL_API_URL:https://api.brevo.com/v3/smtp/email}
    api-key: ${EMAIL_API_KEY:}
    from-email: ${EMAIL_FROM:no-reply@serviya.com}
    from-name: ${EMAIL_FROM_NAME:ServiYa}
    connect-timeout-ms: ${EMAIL_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${EMAIL_READ_TIMEOUT_MS:5000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    use-root-path: true
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false
  packages-to-scan: com.parosurvivors.serviya