services:
  backend:
    build: ./backend/serviya
    container_name: serviya-backend
    # En el primer `up` con volumen limpio, MySQL puede pasar su healthcheck (socket interno,
    # port 0) antes de aceptar en 3306; el backend arranca, no conecta y muere. on-failure lo
    # reintenta hasta que MySQL acepta conexiones de verdad. Ver NOTAS.txt (2026-07-04).
    restart: on-failure
    ports:
      - "8080:8080"
    env_file: .env.example
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Envío de correo (opcional). Con EMAIL_ENABLED distinto de true, el canal EMAIL degrada a FAILED.
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_API_URL: ${EMAIL_API_URL:-https://api.brevo.com/v3/smtp/email}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@serviya.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ServiYa}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql
    container_name: serviya-mysql
    env_file: .env.example
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 3s

  frontend:
    build:
      context: ./frontend/serviya
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: serviya-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data: