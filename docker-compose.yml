services:
  backend:
    build: ./backend/serviya
    container_name: serviya-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql
    container_name: serviya-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 3s

  frontend:
    build:
      context: ./frontend/serviya
    container_name: serviya-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data: