services:
  backend:
    build: ./backend/serviya
    container_name: serviya-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mysql
  mysql:
    image: mysql
    container_name: serviya-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
  frontend:
    build:
      context: ./frontend/serviya
    container_name: serviya-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
volumes:
  mysql_data: