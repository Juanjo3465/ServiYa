services:
  backend:
    build: ./backend/serviya
    container_name: serviya-backend
    # En el primer `up` con volumen limpio, MySQL puede pasar su healthcheck (socket interno,
    # port 0) antes de aceptar en 3306; el backend arranca, no conecta y muere. on-failure lo
    # reintenta hasta que MySQL acepta conexiones de verdad. Ver NOTAS.txt (2026-07-04).
    restart: on-failure
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql
    container_name: serviya-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 3s

  frontend:
    build:
      context: ./frontend/serviya
    container_name: serviya-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data: