services:
  backend:
    build:
      context: ./backend/serviya
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/serviya:/app
      - maven_repo:/root/.m2

  frontend:
    build:
      context: ./frontend/serviya
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/serviya:/app
      - /app/node_modules

volumes:
  maven_repo: